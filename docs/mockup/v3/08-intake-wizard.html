<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<title>LawLink · 收案登记</title>
<link rel="stylesheet" href="design-system.css" />
<style>
  /* 抽屉模式：左侧是模糊的案件列表，右侧是新收案抽屉 */
  .backdrop {
    position: fixed; inset: 0; background: rgba(15,23,42,0.32);
    backdrop-filter: blur(4px); z-index: 40;
  }
  .sheet {
    position: fixed; top: 0; right: 0; bottom: 0; width: 520px;
    background: var(--bg-canvas); z-index: 50;
    box-shadow: var(--sh-float);
    display: flex; flex-direction: column;
    border-left: 1px solid var(--bd-default);
  }

  .sheet-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 24px; border-bottom: 1px solid var(--bd-subtle);
    background: var(--bg-card);
  }
  .sheet-title { font-family: var(--font-display); font-size: 17px; font-weight: 600; letter-spacing: -0.015em; }
  .sheet-close {
    width: 30px; height: 30px; border-radius: var(--r-sm);
    display: flex; align-items: center; justify-content: center;
    color: var(--t-muted); cursor: pointer; border: none; background: transparent;
  }
  .sheet-close:hover { background: var(--bg-hover); color: var(--t-primary); }

  /* 步骤指示器 */
  .stepper {
    display: flex; align-items: center; gap: 0;
    padding: 16px 24px; background: var(--bg-card); border-bottom: 1px solid var(--bd-subtle);
  }
  .step {
    display: flex; align-items: center; gap: 8px; flex-shrink: 0;
  }
  .step-num {
    width: 24px; height: 24px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-mono); font-size: 12px; font-weight: 600;
    background: var(--bg-hover); color: var(--t-muted); flex-shrink: 0;
    transition: all .2s;
  }
  .step.done .step-num { background: var(--indigo); color: #fff; }
  .step.active .step-num {
    background: var(--indigo); color: #fff;
    box-shadow: 0 0 0 4px var(--indigo-soft);
  }
  .step-label { font-size: 12.5px; color: var(--t-muted); font-weight: 500; }
  .step.active .step-label { color: var(--t-primary); }
  .step-line { flex: 1; height: 1.5px; background: var(--bd-subtle); margin: 0 12px; min-width: 20px; }
  .step-line.done { background: var(--indigo); }

  /* 抽屉正文 */
  .sheet-body { flex: 1; overflow-y: auto; padding: 18px; }

  /* 表单 */
  .form-section { margin-bottom: 18px; }
  .form-section-title {
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; font-weight: 600; color: var(--t-secondary);
    letter-spacing: 0.04em; text-transform: uppercase;
    margin-bottom: 14px;
  }
  .form-section-title::before {
    content: ""; width: 3px; height: 12px; background: var(--indigo); border-radius: 2px;
  }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-label { font-size: 12px; font-weight: 500; color: var(--t-secondary); }
  .form-label .req { color: var(--red); margin-left: 2px; }
  .form-input {
    height: 36px; padding: 0 12px;
    background: var(--bg-card); border: 1px solid var(--bd-default);
    border-radius: var(--r-sm); font-size: 13px; color: var(--t-primary);
    box-shadow: var(--sh-inset-deep); font-family: inherit;
    transition: all .15s;
  }
  .form-input:focus { outline: none; border-color: var(--indigo); box-shadow: 0 0 0 3px var(--indigo-glow); }
  .form-input::placeholder { color: var(--t-faint); }

  /* 类别按钮组 */
  .category-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .cat-btn {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    padding: 14px 8px; border-radius: var(--r-md);
    border: 1px solid var(--bd-default); background: var(--bg-card);
    cursor: pointer; transition: all .15s; font-family: inherit;
  }
  .cat-btn:hover { border-color: var(--bd-strong); }
  .cat-btn.active {
    background: var(--indigo-soft); border-color: var(--indigo);
    box-shadow: 0 0 0 3px var(--indigo-glow);
  }
  .cat-btn svg { width: 22px; height: 22px; color: var(--t-muted); }
  .cat-btn.active svg { color: var(--indigo); }
  .cat-btn-name { font-size: 12px; font-weight: 500; color: var(--t-secondary); }
  .cat-btn.active .cat-btn-name { color: var(--indigo); }

  /* 已添加的当事人卡 */
  .added-party {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; background: var(--bg-hover); border-radius: var(--r-sm);
    border: 1px solid var(--bd-subtle); margin-bottom: 8px;
  }
  .added-party-name { font-size: 13px; font-weight: 500; flex: 1; }
  .added-party-meta { font-size: 11px; color: var(--t-muted); }

  /* 底部操作栏 */
  .sheet-foot {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 24px; background: var(--bg-card); border-top: 1px solid var(--bd-subtle);
  }
  .foot-progress { font-size: 12px; color: var(--t-muted); }
  .foot-actions { display: flex; gap: 8px; }

  /* 模糊背景：案件列表轮廓 */
  .bg-list { filter: blur(2px) brightness(1.05); opacity: 0.7; pointer-events: none; }
</style>
</head>
<body>
<div class="shell">
  <aside class="sidebar">
    <div class="brand"><div class="brand-mark">L</div><div><div class="brand-name">立正律师事务所</div><div class="brand-sub">LawLink · v3</div></div></div>
    <nav class="nav">
      <div class="nav-section-label">工作区</div>
      <div class="nav-item"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 12l9-9 9 9M5 10v10h14V10"/></svg>工作台</div>
      <div class="nav-item active"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>案件 <span class="count">18</span></div>
      <div class="nav-item"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="9" cy="8" r="3.5"/><path d="M2 20c0-3.5 3-6 7-6s7 2.5 7 6"/></svg>客户</div>
      <div class="nav-item"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="6" width="18" height="13" rx="2"/><path d="M3 10h18"/></svg>财务</div>
      <div class="nav-item"><svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="5" width="18" height="16" rx="2"/><path d="M3 9h18M8 3v4M16 3v4"/></svg>日程</div>
    </nav>
  </aside>

  <div class="main">
    <header class="topbar bg-list">
      <div class="searchbox"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>搜索案件、客户、材料...<span class="kbd">⌘K</span></div>
      <div style="flex:1"></div>
      <button class="btn btn-primary btn-sm"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 5v14M5 12h14"/></svg>新建收案</button>
    </header>

    <div class="content bg-list">
      <div class="page-head">
        <div><h1 style="font-family:var(--font-display);font-size:26px;font-weight:600;margin:0 0 4px">案件</h1><p style="font-size:13px;color:var(--t-muted);margin:0">全部 18 个办理中案件</p></div>
      </div>
      <div class="card" style="height:400px;background:var(--bg-card)">
        <div style="padding:60px 40px;text-align:center;color:var(--t-faint)">
          <p style="font-size:14px">案件列表（背景模糊）</p>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 遮罩 + 抽屉 -->
<div class="backdrop"></div>
<div class="sheet">
  <div class="sheet-head">
    <div>
      <div class="sheet-title">新建收案登记</div>
      <div class="t-xs t-mute" style="margin-top:2px">案件从这里开始它的生命周期</div>
    </div>
    <button class="sheet-close"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
  </div>

  <!-- 步骤指示器 -->
  <div class="stepper">
    <div class="step done">
      <div class="step-num"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><path d="M5 12l5 5L20 7"/></svg></div>
      <span class="step-label">案件类别</span>
    </div>
    <div class="step-line done"></div>
    <div class="step active">
      <div class="step-num">2</div>
      <span class="step-label">当事人</span>
    </div>
    <div class="step-line"></div>
    <div class="step">
      <div class="step-num">3</div>
      <span class="step-label">程序信息</span>
    </div>
    <div class="step-line"></div>
    <div class="step">
      <div class="step-num">4</div>
      <span class="step-label">案由标的</span>
    </div>
  </div>

  <div class="sheet-body">

    <!-- 当前类别回显 -->
    <div style="display:flex;align-items:center;gap:10px;padding:12px 14px;background:var(--indigo-soft);border-radius:var(--r-md);margin-bottom:24px;border:1px solid var(--bd-accent)">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--indigo)" stroke-width="1.8"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>
      <span style="font-size:13px;font-weight:500;color:var(--indigo)">民商事 · 诉讼</span>
      <button class="t-xs" style="margin-left:auto;color:var(--indigo);cursor:pointer;background:none;border:none">修改</button>
    </div>

    <!-- 委托方 -->
    <div class="form-section">
      <div class="form-section-title">委托方</div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">客户类型<span class="req">*</span></label>
          <select class="form-input"><option>公司</option></select>
        </div>
        <div class="form-group">
          <label class="form-label">客户<span class="req">*</span></label>
          <input class="form-input" placeholder="搜索或输入客户..." value="上海青石建设有限公司" />
        </div>
      </div>
      <div class="added-party">
        <div class="avatar av-indigo av-square" style="width:28px;height:28px;font-size:11px">青</div>
        <div style="flex:1">
          <div class="added-party-name">上海青石建设有限公司</div>
          <div class="added-party-meta mono">公司 · 91310115MA1K3P2X</div>
        </div>
        <span class="badge b-indigo">委托方</span>
        <button class="sheet-close" style="width:24px;height:24px"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
      </div>
    </div>

    <!-- 诉讼对方 -->
    <div class="form-section">
      <div class="form-section-title">诉讼对方</div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">客户类型<span class="req">*</span></label>
          <select class="form-input"><option>公司</option></select>
        </div>
        <div class="form-group">
          <label class="form-label">对方<span class="req">*</span></label>
          <input class="form-input" placeholder="搜索或输入对方..." value="华东置业集团有限公司" />
        </div>
      </div>
      <div class="added-party">
        <div class="avatar av-orange av-square" style="width:28px;height:28px;font-size:11px">华</div>
        <div style="flex:1">
          <div class="added-party-name">华东置业集团有限公司</div>
          <div class="added-party-meta mono">公司 · 91310104MA1FL8K7</div>
        </div>
        <span class="badge b-orange">对方</span>
        <button class="sheet-close" style="width:24px;height:24px"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg></button>
      </div>
      <button class="btn btn-ghost btn-sm" style="margin-top:4px;padding:0">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
        添加第三人
      </button>
    </div>

    <!-- 客户联系人 -->
    <div class="form-section">
      <div class="form-section-title">客户联系人</div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">姓名<span class="req">*</span></label>
          <input class="form-input" placeholder="姓名" value="王建华" />
        </div>
        <div class="form-group">
          <label class="form-label">电话<span class="req">*</span></label>
          <input class="form-input" placeholder="手机号" value="138 0000 6789" />
        </div>
      </div>
    </div>

  </div>

  <!-- 底部 -->
  <div class="sheet-foot">
    <div class="foot-progress">步骤 2 / 4 · 当事人</div>
    <div class="foot-actions">
      <button class="btn btn-secondary btn-sm">上一步</button>
      <button class="btn btn-primary">
        下一步
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
      </button>
    </div>
  </div>
</div>

</body>
</html>
