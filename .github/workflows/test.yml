name: Test

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npm run test:run

  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: lawlink
          POSTGRES_PASSWORD: lawlink
          POSTGRES_DB: lawlink_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U lawlink -d lawlink_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://lawlink:lawlink@localhost:5432/lawlink_test?schema=public
      NEXTAUTH_SECRET: ci-test-secret-not-for-production
      NEXTAUTH_URL: http://127.0.0.1:3000
      STORAGE_ENCRYPTION_KEY: Y2ktdGVzdC1lbmNyeXB0aW9uLWtleS0zMg==
      SEED_ADMIN_EMAIL: admin@lawlink.local
      SEED_ADMIN_PASSWORD: ChangeMe!2026
      E2E_LOGIN_EMAIL: admin@lawlink.local
      E2E_LOGIN_PASSWORD: ChangeMe!2026
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma migrate deploy
      - run: npx prisma db seed
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
        env:
          CI: "true"
