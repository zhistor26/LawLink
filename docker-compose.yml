services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: lawlink
      POSTGRES_USER: lawlink
      POSTGRES_PASSWORD: lawlink
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://lawlink:lawlink@db:5432/lawlink?schema=public
      NEXTAUTH_SECRET: replace-with-a-long-random-secret
      NEXTAUTH_URL: http://localhost:3000
      APP_STORAGE_DIR: /app/storage
    ports:
      - "3000:3000"
    volumes:
      - app_storage:/app/storage

volumes:
  postgres_data:
  app_storage:
